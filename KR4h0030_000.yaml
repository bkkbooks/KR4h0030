body:
  text: 三劉家集總集類提要臣等謹案三劉家集一卷宋劉渙劉恕劉羲仲之遺文也渙字凝之筠州人登天聖八年進士為潁上令以太子中允致仕長子恕字道原舉進士入髙等授巨鹿主簿遷知和川翁源二縣司馬光受詔修資治通鑑奏請同修轉著作郎與王安石不平告歸終養改祕書丞就家續成前書長子羲仲字壯輿以恕修書功官郊社齊郎洊厯至汝州儀曹因薦召入以宣教郎為國史檢討三世並剛直有史才而恕最優司馬光稱其博聞強記細大之事皆有依據誠公論也是集為咸淳中其裔孫御史元髙所輯蓋南宋之末已無傳本僅掇拾於殘缺之餘故渙僅詩四首文二首恕僅通鑑外紀序一首併其子所記通鑑問疑羲仲僅家書一首餘皆同時諸人唱和之作及他人之文有關於渙父子者也其中稱渙曰西澗先生稱恕曰祕丞稱羲仲曰檢討固其子孫之詞至於諸人詩文標題一概刪去其稱字之文而改曰西澗先生祕丞檢討殊非其實矣此則編次之陋也至明萬安貪鄙無恥為世僇笑而獨存其一跋於卷末渙父子祖孫豈藉是人以表章乎今刋除之俾無為三人之玷焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b36725484071e747e5428b676bbab5aa83a8d7bcd878101775c20344018058e8
